name: Scheduled Pipeline

on:
  schedule:
    # Runs every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:
    inputs:
      command:
        description: "Pipeline command to run"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - seed
          - ingest
          - score
          - radar

permissions:
  contents: read

jobs:
  pipeline:
    name: Run VRE pipeline
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DENVER_OPEN_DATA_APP_TOKEN: ${{ secrets.DENVER_OPEN_DATA_APP_TOKEN }}
        run: python run.py ${{ inputs.command || 'all' }}
